<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DevOps Project</title>

<style>
body{
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(135deg,#1e3c72,#2a5298);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}

.card{
  background:rgba(255,255,255,0.1);
  padding:40px;
  border-radius:12px;
  text-align:center;
  backdrop-filter:blur(10px);
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h1{
  font-size:40px;
  margin-bottom:10px;
}

p{
  opacity:0.9;
}
</style>

</head>

<body>

<div class="card">
<h1>🚀 DevOps Project</h1>
<p>Nginx rodando em container</p>
<p>Infra provisionada com Terraform</p>
<p>Deploy via CI/CD</p>
</div>

</body>
</html>
